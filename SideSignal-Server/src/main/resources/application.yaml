spring:
  application:
    name: side-signal

server:
  forward-headers-strategy: framework

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: health

sidesignal:
  jwt:
    issuer: side-signal
    secret: ${SIDESIGNAL_JWT_SECRET:local-development-jwt-secret-change-me-before-production}
    access-token-expiration: PT2H
